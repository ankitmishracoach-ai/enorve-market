  <!-- Google Analytics 4 — CONSENT-GATED.
       Does not auto-load. The CookieConsent component in React calls
       window.enorveLoadAnalytics() only after the visitor accepts. -->
  <script>
    window.GA_MEASUREMENT_ID = '%VITE_GA_MEASUREMENT_ID%';
    window.enorveAnalyticsLoaded = false;
    window.enorveLoadAnalytics = function () {
      if (window.enorveAnalyticsLoaded) return;
      var id = window.GA_MEASUREMENT_ID;
      if (!id || typeof id !== 'string' || id.indexOf('G-') !== 0) return;
      window.enorveAnalyticsLoaded = true;

      var s = document.createElement('script');
      s.async = true;
      s.src = 'https://www.googletagmanager.com/gtag/js?id=' + id;
      document.head.appendChild(s);

      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      window.gtag = gtag;
      gtag('js', new Date());
      gtag('config', id, {
        'send_page_view': true,
        'anonymize_ip': true
      });
    };
  </script>

  <!-- Enorve Live Chat Widget -->
  <script>
    (function() {
      window.EnorveChat = window.EnorveChat || function() {
        (window.EnorveChat.q = window.EnorveChat.q || []).push(arguments);
      };
      var script = document.createElement('script');
      script.src = 'https://uggsfinugqzjfroxzpbo.supabase.co/functions/v1/serve-chat-widget';
      script.async = true;
      document.head.appendChild(script);

      // 2026-05-23 fix: URL-aware role hint. Sales-mapped paths get the
      // sales role passed explicitly so the server skips URL pattern
      // matching and the widget renders Spotlight on first paint. Without
      // this, visitors landing directly on /pricing saw the support
      // launcher first and the swap only fired on later SPA navigation.
      // Belt-and-suspenders with the serve-chat-widget re-resolve hook
      // (which catches all other tenants automatically); this snippet
      // additionally eliminates the flash entirely on predictable routes.
      var roleHint = null;
      try {
        var path = (window.location && window.location.pathname) || '';
        if (path.indexOf('/pricing') === 0) {
          roleHint = 'sales';
        }
      } catch (e) {
        // window.location unavailable (SSR build step etc.) — leave null
      }

      var initConfig = {
        widgetKey: '4c5690be-74d8-4fea-ae73-9f53f2529733',
        position: 'bottom-right',
        primaryColor: '#1C7C54',
        installSource: 'script'
      };
      if (roleHint) initConfig.role_hint = roleHint;
      window.EnorveChat('init', initConfig);
    })();
  </script>
